  - pandas>=1.5.0
  - numpy>=1.24.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - scikit-learn>=1.3.0
  - statsmodels>=0.14.0
  - jupyter>=1.0.0
  - notebook>=6.0.0
  - ipykernel>=6.0.0
  - pip
  - pip:
    - -r requirements.txt